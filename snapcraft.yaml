name: recall
base: core22
version: '0.1.0'
summary: Clipboard history manager with search, preview and keyboard-driven paste
description: |
  Recall captures everything you copy and lets you find it instantly.

  **Features**
  - Clipboard history for text (plain, HTML, RTF) and images
  - Real-time search with Ctrl+K
  - Keyboard navigation (↑ ↓ to browse, Enter to paste)
  - Global shortcut to open from anywhere (default: Ctrl+Shift+V)
  - Image preview
  - Persistent history across sessions (configurable size, default 5000 entries)
  - Launch at startup
  - System tray

  Built with Tauri (Rust backend) and SvelteKit — native performance, minimal footprint.

  Source code: https://github.com/mouafus/recall

grade: stable
confinement: strict
license: MIT

contact: https://github.com/mouafus/recall/issues
issues: https://github.com/mouafus/recall/issues
source-code: https://github.com/mouafus/recall
website: https://github.com/mouafus/recall

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  recall:
    command: usr/bin/recall
    desktop: usr/share/applications/recall.desktop
    extensions: [ gnome ]
    plugs:
      - removable-media

parts:
  build-app:
    plugin: dump
    source: .
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - libxdo-dev
      - libssl-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - dpkg
      - pkg-config
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - libxcb-shape0
      - libatk-adaptor
    override-build: |
      set -eux
      # Install Node.js 20 LTS
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      # Install Rust
      curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
      export PATH="$HOME/.cargo/bin:$PATH"
      npm install
      npm run tauri build -- --bundles deb
      dpkg -x target/release/bundle/deb/*.deb "$SNAPCRAFT_PART_INSTALL/"
